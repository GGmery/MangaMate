<header class="app-header">
  <div class="logo">
    <img src="assets/images/logo.png" alt="MangaMate logo" />
    <span class="title">MangaMate</span>
  </div>

  <nav class="nav-links">
    <a routerLink="/" routerLinkActive="active">Inicio</a>
    <a routerLink="/search" routerLinkActive="active">Buscar</a>
    <a routerLink="/my-list" routerLinkActive="active">Mi Lista</a>
    <a routerLink="/discover" routerLinkActive="active">Descubrir</a>
  </nav>

  <button class="theme-toggle" (click)="toggleTheme()">
    @if (theme === 'light') {
      <span>🌞 Día</span>
    } @else {
      <span>🌙 Noche</span>
    }
  </button>
</header>
